server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolves container names dynamically at request
    # time rather than at nginx startup, so nginx stays up even if the backend
    # container is temporarily down or hasn't started yet.
    resolver 127.0.0.11 valid=10s;
    set $backend "http://backend:3000";

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to backend container
    location /api/ {
        proxy_pass         $backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # SSE endpoint — must disable buffering so events are streamed immediately
    location /events {
        proxy_pass             $backend;
        proxy_set_header       Host $host;
        proxy_set_header       Connection '';
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     86400s;
        chunked_transfer_encoding on;
    }
}
